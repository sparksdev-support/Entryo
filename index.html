nav,.language-links{display:flex;flex-wrap:wrap;gap:12px;margin:20px 0 0}a{color:var(--link);text-decoration:none}a:hover{text-decoration:underline}.button-link{display:inline-flex;padding:10px 14px;border:1px solid var(--border);border-radius:999px}
footer{margin-top:32px;color:var(--muted);font-size:14px}ul{padding-left:22px}
